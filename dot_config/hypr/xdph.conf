# xdg-desktop-portal-hyprland config
screencopy {
    # Keep OFF: with tokens on by default, Chromium silently restores the
    # PREVIOUS selection on the next share (no picker at all) — picking a
    # different region/window becomes impossible until the token dies.
    # Tick the picker's "allow token" checkbox per-share when persistence
    # is actually wanted (e.g. a recurring meeting sharing the same screen).
    allow_token_by_default = false

    # Dedupe the picker: Chromium/Electron opens several portal sessions per
    # share and each pops a dialog; the wrapper replays the first selection.
    custom_picker_binary = /home/mason/.local/bin/share-picker-cached
}
