# Force Vivaldi to use discrete GPU (RX 7600) instead of Phoenix iGPU
# Vulkan + SkiaGraphite bypasses software canvas fallback from GPU driver workaround
--enable-features=VaapiVideoDecoder,VaapiVideoEncoder,WaylandFractionalScaleV1,Vulkan,SkiaGraphite,DefaultANGLEVulkan
--use-vulkan=native
--disable-features=UseChromeOSDirectVideoDecoder
--disable-font-subpixel-positioning
--disable-gpu-vsync
