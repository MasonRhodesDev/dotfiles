# Flutter SDK — mirrors ~/.config/fish/conf.d/flutter.fish but session-wide,
# so bash/sh/zsh/GUI processes (incl. Claude Code's Bash tool) inherit it
# from the systemd user session. Fish still works because its conf.d still
# adds the same dir (idempotent — the string-match guard skips duplicates).
FLUTTER_HOME=/home/mason/flutter
PATH=/home/mason/flutter/bin:${PATH}
