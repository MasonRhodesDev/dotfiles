# hyprstate power policy: base state -> profile (see POWER_SPEC.md in the
# hyprstate repo). Profiles: power-saver | balanced | performance.
# Manual override: `hyprstate power set <profile>` or click the waybar widget;
# overrides auto-clear when the AC state changes.
# battery* keys are inert on machines without a battery.
#@ docked-ac = balanced
#@ ac = balanced
#@ battery = power-saver
#@ battery-low = power-saver
#@ battery-low-percent = 15
