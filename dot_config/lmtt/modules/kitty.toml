# Kitty terminal — palette mapping mirrors lmtt-modules/src/wezterm.rs:
# Material tokens for semantic slots, fixed per-mode hues for the ANSI
# slots Material You has no token for (green/yellow/cyan), so ls/diffs/TUIs
# keep conventional hues.

name = "kitty"
description = "Kitty terminal emulator (parity with WezTerm module)"
binary = "kitty"
priority = 100

[output]
path = "~/.config/kitty/lmtt-colors.conf"
format = "conf"

[template]
content = """
# Kitty colors generated by lmtt — do not edit

background {{surface}}
foreground {{on_surface}}

cursor {{primary}}
cursor_text_color {{on_primary}}

selection_background {{primary_container}}
selection_foreground {{on_primary_container}}

url_color {{primary}}

# Slot order: black, red, green, yellow, blue, magenta, cyan, white
color0  {{#if (eq mode "dark")}}{{surface_container_high}}{{else}}{{on_surface}}{{/if}}
color1  {{error}}
color2  {{#if (eq mode "dark")}}#98c379{{else}}#50a14f{{/if}}
color3  {{#if (eq mode "dark")}}#e5c07b{{else}}#c18401{{/if}}
color4  {{primary}}
color5  {{secondary}}
color6  {{#if (eq mode "dark")}}#56b6c2{{else}}#0184bc{{/if}}
color7  {{on_surface_variant}}

color8  {{outline}}
color9  {{error}}
color10 {{#if (eq mode "dark")}}#b5e890{{else}}#3f8e3e{{/if}}
color11 {{#if (eq mode "dark")}}#ecd09b{{else}}#a06d00{{/if}}
color12 {{primary}}
color13 {{secondary}}
color14 {{#if (eq mode "dark")}}#7bdfec{{else}}#016d9c{{/if}}
color15 {{on_surface}}

# Header (tab bar) — consumed by tab_bar.py via DrawData
tab_bar_background      {{surface_container}}
active_tab_background   {{primary}}
active_tab_foreground   {{on_primary}}
inactive_tab_background {{surface_container}}
inactive_tab_foreground {{on_surface_variant}}
"""

[reload]
# In-process config reload; recolors all windows live. No per-window config
# re-evaluation exists in kitty, so no reload fan-out.
command = "pkill -USR1 -x kitty || true"
timeout = 5000

[setup]
config_file = "~/.config/kitty/kitty.conf"
include_line = "include lmtt-colors.conf"
description = "Include LMTT colors in Kitty config"
