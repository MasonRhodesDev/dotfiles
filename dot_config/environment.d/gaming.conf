# Shader cache (AMD)
MESA_SHADER_CACHE_MAX_SIZE=12G

# AMD Anti-Lag (RDNA+)
ENABLE_LAYER_MESA_ANTI_LAG=1

# RADV persistent cache (faster load times)
RADV_ENABLE_PERSISTENT_CACHE=1

# RADV transfer queue (GFX9+)
RADV_PERFTEST=transfer_queue

# Reduce latency from dynamic linking
LD_BIND_NOW=1

# Xbox BT reconnect fix: use kernel evdev (xpadneo) instead of HIDAPI.
# HIDAPI opens a hidraw fd that becomes a zombie when the controller turns off;
# evdev is managed by xpadneo which handles BT reconnection at the kernel level.
SDL_JOYSTICK_HIDAPI_XBOX=0
