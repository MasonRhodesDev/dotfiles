# Prefix drop-in: applies to every app-*.scope (Hyprland/uwsm-launched apps,
# including whichever scope Steam lands in regardless of how it was started).
# Before= means these scopes STOP only AFTER steam-clean-shutdown.service has
# finished its ExecStop (steam -shutdown), so Steam exits cleanly instead of
# being SIGTERM'd (CEF counts SIGTERM as a crash -> can disable GPU accel).
[Unit]
Before=steam-clean-shutdown.service
