# hyprnotice config — overrides daemon defaults.
# Reload: pkill -HUP hyprnotice (also fires on every `lmtt switch`).
# Schema reference: /home/mason/repos/hyprnotice/assets/example.conf

popup {
    anchor = top right
    layer  = overlay
    margin_top  = 12
    margin_left = 12
    width  = 480
    height = 110
    default_timeout = 5000
    max_visible = 5
}

theme {
    # Empty = use lmtt's default (~/.config/matugen/lmtt-colors.css).
    colors_path =
}

# Add per-app rules below as needed. Format:
#   rule {
#       app = slack
#       timeout = 0          # 0 = persistent
#       skip_popup = 0       # 1 = inbox-only, no popup
#   }
