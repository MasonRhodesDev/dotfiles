# Profile: Dual Dell S2725QC 4K @ 120Hz, scale 1.25, side-by-side.
#
#@ match = desc:Dell Inc. DELL S2725QC 5DGMS84
#@ match = desc:Dell Inc. DELL S2725QC FFJMS84
#@ edp = auto

monitor = desc:Dell Inc. DELL S2725QC 5DGMS84,3840x2160@120,0x0,1.25
monitor = desc:Dell Inc. DELL S2725QC FFJMS84,3840x2160@120,3072x0,1.25
# eDP-2 sits to the right of both 4Ks (6144 = 3072 + 3072). Same 1.25 scale
# so the cursor moves smoothly between the externals and the laptop panel.
monitor = eDP-2,2560x1600@165,6144x0,1.25

workspace = 1, monitor:desc:Dell Inc. DELL S2725QC 5DGMS84, default:true
