# kitty config — parity port of ~/.config/wezterm/wezterm.lua
# Colors are generated by lmtt into lmtt-colors.conf and applied live via
# SIGUSR1 config reload (in-process; no per-window config re-evaluation).

# ── Font ─────────────────────────────────────────────────────────────
# Fontconfig handles fallback (JetBrainsMono/FiraCode Nerd Fonts) automatically.
font_family      Lilex
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# ── Window ───────────────────────────────────────────────────────────
background_opacity            0.95
dynamic_background_opacity    yes
linux_display_server          wayland
update_check_interval         0

# Match wezterm notification_handling = "NeverShow"
filter_notification all

# ── Header bar ───────────────────────────────────────────────────────
# The tab bar is the status header: always visible, custom-drawn by
# tab_bar.py (agent status + SSH indicator), no tab titles — same as the
# wezterm setup (enable_tab_bar + show_tabs_in_tab_bar=false).
tab_bar_edge      top
tab_bar_style     custom
# Start hidden (no empty-header flash at launch); tab_bar.py flips this to 1
# the moment header content exists, and back when it goes away.
tab_bar_min_tabs  9999
tab_bar_align     left

# ── Remote control ───────────────────────────────────────────────────
# Used by scripts (and available to lmtt) for live control without reloads.
allow_remote_control yes
listen_on            unix:@kitty-{kitty_pid}

# Refresh header state (agent user vars) event-driven instead of polling.
watcher watcher.py

# ── Colors (generated by lmtt — do not edit lmtt-colors.conf) ────────
include lmtt-colors.conf

# ── Keys ─────────────────────────────────────────────────────────────
# Shift+Enter sends ESC+CR (Claude Code newline)
map shift+enter send_text all \x1b\r

# Explicit clipboard bindings (kitty defaults, kept for parity clarity)
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# Smart paste: image → temp file path, text → text (for Claude Code)
map ctrl+v kitten paste_image.py

# file:line opening: kitty_mod+p>n (default) selects path:line hints and
# opens in $EDITOR — replaces the wezterm double-click mouse handler.
