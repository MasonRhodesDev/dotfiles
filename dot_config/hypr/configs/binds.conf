$Meh=CTRL ALT SHIFT
$Hyper=SUPER ALT SHIFT

bind=$mainMod, Q, exec, wezterm
bind=$mainMod, C, killactive, 
bind=$mainMod, E, exec, thunar
bind=$mainMod, V, togglefloating, 
bind=$mainMod, R, exec, hyprlauncher
bind=$mainMod, P, pseudo, # dwindle
bind=$mainMod, J, layoutmsg, togglesplit
bind=$mainMod, F, fullscreen,
bind=$mainMod, left, movefocus, l
bind=$mainMod, right, movefocus, r
bind=$mainMod, up, movefocus, u
bind=$mainMod, down, movefocus, d
bind=$Meh, h, movefocus, l
bind=$Meh, j, movefocus, d
bind=$Meh, k, movefocus, u
bind=$Meh, l, movefocus, r
bind=$mainMod SHIFT, left, movewindow, l
bind=$mainMod SHIFT, right, movewindow, r
bind=$mainMod SHIFT, up, movewindow, u
bind=$mainMod SHIFT, down, movewindow, d
# ===== Workspace bindings =====
# Unified workspace management script handles special workspace coordination
bind = $mainMod, 1, exec, ~/.config/hypr/scripts/hypr-workspace switch 1
bind = $mainMod, 2, exec, ~/.config/hypr/scripts/hypr-workspace switch 2
bind = $mainMod, 3, exec, ~/.config/hypr/scripts/hypr-workspace switch 3
bind = $mainMod, 4, exec, ~/.config/hypr/scripts/hypr-workspace switch 4
bind = $mainMod, 5, exec, ~/.config/hypr/scripts/hypr-workspace switch 5
bind = $mainMod, 6, exec, ~/.config/hypr/scripts/hypr-workspace switch 6
bind = $mainMod, 7, exec, ~/.config/hypr/scripts/hypr-workspace switch 7
bind = $mainMod, 8, exec, ~/.config/hypr/scripts/hypr-workspace switch 8
bind = $mainMod, 9, exec, ~/.config/hypr/scripts/hypr-workspace switch 9
bind = $mainMod, 0, togglespecialworkspace, magic
bind=$mainMod SHIFT, 1, movetoworkspace, 1
bind=$mainMod SHIFT, 2, movetoworkspace, 2
bind=$mainMod SHIFT, 3, movetoworkspace, 3
bind=$mainMod SHIFT, 4, movetoworkspace, 4
bind=$mainMod SHIFT, 5, movetoworkspace, 5
bind=$mainMod SHIFT, 6, movetoworkspace, 6
bind=$mainMod SHIFT, 7, movetoworkspace, 7
bind=$mainMod SHIFT, 8, movetoworkspace, 8
bind=$mainMod SHIFT, 9, movetoworkspace, 9
bind=$mainMod SHIFT, 0, movetoworkspace, 10
bind=$mainMod, S, togglespecialworkspace, magic
bind=$mainMod SHIFT, S, movetoworkspace, special:magic
bind=SUPER ALT, S, exec, ~/.config/hypr/scripts/hypr-workspace toggle-special
bind=$Hyper, S, exec, ~/.config/hypr/scripts/hypr-workspace move-to-special
bind=$mainMod SHIFT, MINUS, movecurrentworkspacetomonitor, -1
bind=$mainMod SHIFT, EQUAL, movecurrentworkspacetomonitor, +1
bind=$mainMod, mouse_down, workspace, e+1
bind=$mainMod, mouse_up, workspace, e-1
bind=, Print, exec, /home/mason/scripts/snip
bind=SHIFT, Print, exec, /home/mason/scripts/record
bind=$mainMod, L, exec, hyprlock 
bind=$mainMod, M, exec, ~/.config/hypr/scripts/power-menu.sh
bind=$mainMod, T, exec, lmtt switch 
bind=$mainMod, N, exec, swaync-client -t -sw
bind=$mainMod, XF86AudioPlay, exec, ~/.config/wofi/change-default-audio-device.js WofiListAudioDevices
bindl=, XF86AudioPlay, exec, ~/.config/swaync/scripts/media-osd.sh play-pause
bindl=, XF86AudioStop, exec, ~/.config/swaync/scripts/media-osd.sh stop
bindl=, XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl=, XF86AudioNext, exec, ~/.config/swaync/scripts/media-osd.sh next
bindl=, XF86AudioPrev, exec, ~/.config/swaync/scripts/media-osd.sh previous
bindle=, XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 1%+
bindle=, XF86AudioLowerVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 1%-
bindle=, XF86MonBrightnessUp, exec, ~/.config/swaync/scripts/brightness-osd.sh up
bindle=, XF86MonBrightnessDown, exec, ~/.config/swaync/scripts/brightness-osd.sh down

# bind=SHIFT,TAB,exec, steam steam://open/friends

bindm=$mainMod, mouse:272, movewindow
bindm=$mainMod, mouse:273, resizewindow

# to switch between windows in a floating workspace
bind = ALT, Tab, cyclenext,           # change focus to another window
bind = ALT, Tab, bringactivetotop,    # bring it to the top

bind=SHIFT, XF86AudioPlay, exec, hyprpwcenter

# Clear clipboard before DnD (workaround for Hyprland #9637)
bind=$mainMod, D, exec, wl-copy --clear && notify-send -t 2000 "Clipboard cleared" "Ready for drag-and-drop"

# Voice dictation
bind=$Meh, V, exec, voice-dictation toggle
