<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Disable hinting for Greycliff CF web font to prevent misalignment -->
  <match target="font">
    <test name="family" compare="eq">
      <string>Greycliff CF</string>
    </test>
    <edit name="hinting" mode="assign">
      <bool>false</bool>
    </edit>
    <edit name="hintstyle" mode="assign">
      <const>hintnone</const>
    </edit>
  </match>

  <match target="font">
    <test name="family" compare="eq">
      <string>greycliff-cf</string>
    </test>
    <edit name="hinting" mode="assign">
      <bool>false</bool>
    </edit>
    <edit name="hintstyle" mode="assign">
      <const>hintnone</const>
    </edit>
  </match>

  <!-- Ensure good antialiasing for all fonts -->
  <match target="font">
    <edit name="antialias" mode="assign">
      <bool>true</bool>
    </edit>
  </match>

  <!-- Use slight hinting for most fonts but not Greycliff CF -->
  <match target="font">
    <test name="family" compare="not_eq">
      <string>Greycliff CF</string>
    </test>
    <test name="family" compare="not_eq">
      <string>greycliff-cf</string>
    </test>
    <edit name="hintstyle" mode="assign">
      <const>hintslight</const>
    </edit>
  </match>
</fontconfig>
