# ============================================================================
# SOFTWARE PACKAGE REGISTRY
# ============================================================================
# Declarative manifest. The LLM installer determines how to install each
# entry for the current OS. Fields:
#   profile   = common | work | personal
#   priority  = install order (lower = first)
#   version   = "latest" or pinned (e.g. "0.11.5")
#   github    = GitHub repo URL (source of truth for source builds)
#   website   = project website (optional)
#   verify    = shell command to confirm installation
#   depends_on = list of keys that must be installed first
#   optional  = skip gracefully if unavailable
# ============================================================================

# ============================================================================
# COMMON — all machines
# ============================================================================

[build_tools]
description = "Build tools and compilers (make, gcc, cmake, pkg-config, etc.)"
profile = "common"
priority = 1
version = "latest"
verify = "command -v gcc"

[core_utils]
description = "Essential system utilities: curl, git, jq, thunar, wireplumber, NetworkManager, go, keychain, direnv, headsetcontrol"
profile = "common"
priority = 2
version = "latest"
verify = "command -v git"

[gnome_keyring]
description = "GNOME keyring credential manager (provides gnome-keyring-daemon)"
profile = "common"
priority = 2
version = "latest"
github = "https://gitlab.gnome.org/GNOME/gnome-keyring"
verify = "command -v gnome-keyring-daemon"

[terminal]
description = "Terminal emulators and shell: wezterm, tmux, fish"
profile = "common"
priority = 2
version = "latest"
github = "https://github.com/wez/wezterm"
verify = "command -v wezterm"

[fonts_lilex]
description = "Lilex monospace font for terminal and code editing"
profile = "common"
priority = 3
version = "2.621"
github = "https://github.com/mishamyrt/Lilex"
verify = "fc-list | grep -qi lilex"

[fonts_system]
description = "System fonts: powerline, fira-code, google-roboto"
profile = "common"
priority = 3
version = "latest"
verify = "fc-list | grep -qi roboto"

[shell_tools]
description = "Shell prompt: oh-my-posh"
profile = "common"
priority = 3
version = "latest"
github = "https://github.com/JanDeDobbeleer/oh-my-posh"
website = "https://ohmyposh.dev"
verify = "command -v oh-my-posh"

[node_tooling]
description = "Node.js toolchain: fnm (version manager) and bun (runtime/bundler)"
profile = "common"
priority = 4
version = "latest"
github = "https://github.com/Schniz/fnm"
website = "https://bun.sh"
verify = "command -v bun"
depends_on = ["core_utils"]

[cargo_tools]
description = "Rust cargo utilities: cargo-watch, wasm-pack, wayfreeze, wayshot"
profile = "common"
priority = 4
version = "latest"
github = "https://github.com/rust-lang/cargo"
verify = "command -v cargo"

[lmtt]
description = "Linux multi-theme toggle — switches light/dark themes across all apps"
profile = "common"
priority = 4
version = "latest"
github = "https://github.com/MasonRhodesDev/linux-multi-theme-toggle"
verify = "command -v lmtt"

[logind_idle_control]
description = "System idle control for Wayland/logind"
profile = "common"
priority = 4
version = "latest"
github = "https://github.com/MasonRhodesDev/logind-idle-control"
verify = "command -v logind-idle-control"

[voice_dictation]
description = "Wayland voice dictation tool"
profile = "common"
priority = 4
version = "latest"
github = "https://github.com/MasonRhodesDev/wayland-voice-dictation"
verify = "command -v voice-dictation"

[hyprland]
description = "Hyprland Wayland compositor and ecosystem: hyprland, hyprlock, hypridle, hyprpicker, hyprcursor, hyprpolkitagent, xdg-desktop-portal-hyprland, waybar, wofi, swaync, swaybg, wl-clipboard, grim, slurp, satty, pavucontrol, dunst, udiskie, uwsm"
profile = "common"
priority = 5
version = "latest"
github = "https://github.com/hyprwm/Hyprland"
website = "https://hyprland.org"
verify = "command -v hyprland"
depends_on = ["core_utils"]

[hyprlauncher]
description = "Application launcher for Hyprland"
profile = "common"
priority = 5
version = "latest"
github = "https://github.com/hyprwm/hyprlauncher"
verify = "command -v hyprlauncher"
depends_on = ["hyprland"]

[hyprls]
description = "Hyprland language server (LSP for hyprland config)"
profile = "common"
priority = 5
version = "latest"
github = "https://github.com/hyprwm/hyprls"
verify = "command -v hyprls"
depends_on = ["hyprland"]

[hyprpwcenter]
description = "Hyprland password/authentication dialog"
profile = "common"
priority = 5
version = "latest"
github = "https://github.com/hyprwm/hyprpwcenter"
verify = "command -v hyprpwcenter"
depends_on = ["hyprland"]

[matugen]
description = "Material You color generation for theming"
profile = "common"
priority = 5
version = "latest"
github = "https://github.com/InioX/matugen"
verify = "command -v matugen"

[bemoji]
description = "Emoji picker for Wayland (shell script, no package manager)"
profile = "common"
priority = 5
version = "latest"
github = "https://github.com/marty-oehme/bemoji"
verify = "command -v bemoji"

[waybar_workspace_buttons]
description = "Event-driven Hyprland workspace buttons for Waybar (custom CFFI plugin)"
profile = "common"
priority = 6
version = "latest"
github = "https://github.com/MasonRhodesDev/waybar-workspace-buttons"
verify = "test -f ~/.config/waybar/cffi/workspace_buttons.so"
depends_on = ["hyprland"]

[browsers]
description = "Web browsers: chromium (default) and firefox"
profile = "common"
priority = 7
version = "latest"
website = "https://www.chromium.org"
verify = "command -v chromium"
default_browser = "chromium"
extensions = ["bitwarden"]

[btop]
description = "Resource monitor"
profile = "common"
priority = 7
version = "latest"
github = "https://github.com/aristocratos/btop"
verify = "command -v btop"

[zed]
description = "Zed code editor"
profile = "common"
priority = 7
version = "latest"
github = "https://github.com/zed-industries/zed"
website = "https://zed.dev"
verify = "command -v zed"

[neovim]
description = "Neovim text editor"
profile = "common"
priority = 7
version = "0.11.5"
github = "https://github.com/neovim/neovim"
website = "https://neovim.io"
verify = "~/.local/bin/nvim --version | head -1 | grep 'v0.11'"

[gimp]
description = "Image editing and manipulation"
profile = "common"
priority = 9
version = "latest"
github = "https://gitlab.gnome.org/GNOME/gimp"
website = "https://www.gimp.org"
verify = "command -v gimp"

[nix]
description = "Nix package manager (used as fallback for unavailable packages)"
profile = "common"
priority = 11
version = "latest"
website = "https://nixos.org"
verify = "command -v nix"

[arch_utilities]
description = "Arch-specific package management utilities: paru (AUR helper), downgrade"
profile = "common"
priority = 12
version = "latest"
github = "https://github.com/Morganamilo/paru"
verify = "command -v paru"
optional = true

# ============================================================================
# WORK — work machines only
# ============================================================================

[docker]
description = "Docker container runtime and orchestration tools"
profile = "work"
priority = 11
version = "latest"
github = "https://github.com/docker/docker-ce"
website = "https://docs.docker.com"
verify = "command -v docker"
depends_on = ["build_tools"]

[mongodb]
description = "MongoDB database server and mongosh shell"
profile = "work"
priority = 12
version = "8.0"
website = "https://www.mongodb.com"
verify = "command -v mongosh"

[aws_tools]
description = "AWS CLI v2 and developer tools"
profile = "work"
priority = 13
version = "latest"
github = "https://github.com/aws/aws-cli"
website = "https://aws.amazon.com/cli"
verify = "command -v aws"

[vpn_tools]
description = "Pritunl VPN client"
profile = "work"
priority = 14
version = "latest"
website = "https://client.pritunl.com"
verify = "command -v pritunl-client"

[slack]
description = "Slack team communication"
profile = "work"
priority = 18
version = "latest"
website = "https://slack.com/downloads/linux"
verify = "command -v slack"

[zoom]
description = "Zoom video conferencing"
profile = "work"
priority = 19
version = "latest"
website = "https://zoom.us/download"
verify = "flatpak list --app | grep -q us.zoom.Zoom"

# ============================================================================
# PERSONAL — personal machines only
# ============================================================================

[gaming]
description = "Gaming platforms: steam, lutris, gamemode"
profile = "personal"
priority = 21
version = "latest"
website = "https://store.steampowered.com"
verify = "command -v steam"

[printing]
description = "3D printing slicer: OrcaSlicer"
profile = "personal"
priority = 22
version = "latest"
github = "https://github.com/SoftFever/OrcaSlicer"
verify = "command -v orca-slicer"
optional = true

[social]
description = "Discord communication app"
profile = "personal"
priority = 24
version = "latest"
website = "https://discord.com/download"
verify = "flatpak list --app | grep -q com.discordapp.Discord"
