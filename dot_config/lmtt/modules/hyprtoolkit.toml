name = "hyprtoolkit"
description = "Hyprtoolkit palette with Material You colors"
binary = "hyprlauncher"
priority = 100

[output]
path = "~/.config/hypr/lmtt-hyprtoolkit-colors.conf"
format = "conf"

[template]
content = """# Generated by lmtt - Material You colors for Hyprtoolkit
# Mode: {{mode}}

background = 0xFF{{background}}
base = 0xFF{{surface_container_low}}
text = 0xFF{{on_surface}}
alternate_base = 0xFF{{surface_container_high}}
bright_text = 0xFF{{on_surface}}
link_text = 0xFF{{outline}}
accent = 0xFF{{primary}}
accent_secondary = 0xFF{{secondary}}
"""

[setup]
config_file = "~/.config/hypr/hyprtoolkit.conf"
include_line = "source = ~/.config/hypr/lmtt-hyprtoolkit-colors.conf"
description = "Source LMTT Material You colors in Hyprtoolkit"
