# Mako notification daemon — generates ~/.config/mako/config from the Material
# You palette and signals the daemon to reload. Editing the template? Modify
# the [template].content field below — lmtt re-renders on every theme switch.

name = "mako"
description = "Mako notification daemon with Material You theming"
binary = "makoctl"
priority = 100

[output]
path = "~/.config/mako/config"
format = "conf"

[template]
content = """
# Mako notification daemon — generated by lmtt ({{mode}} mode).
# Source: ~/.config/lmtt/modules/mako.toml

font=Noto Sans 11

# Layout
layer=overlay
anchor=top-right
margin=12
padding=12
border-size=1
border-radius=12
default-timeout=5000
ignore-timeout=1
max-visible=5
max-history=100
sort=-time
group-by=app-name
icons=1
max-icon-size=48

# Material You palette
background-color={{surface_container}}
text-color={{on_surface}}
border-color={{outline_variant}}
progress-color=over {{primary_container}}

[urgency=low]
border-color={{outline_variant}}

[urgency=normal]
border-color={{outline_variant}}

[urgency=high]
border-color={{error}}
text-color={{on_error_container}}
background-color={{error_container}}
default-timeout=0

[hidden]
format=(and {hidden} more)
text-color={{on_surface_variant}}

[mode=do-not-disturb]
invisible=1
"""

[reload]
command = "makoctl reload 2>/dev/null || true"
timeout = 5000
