# Fuzzel configuration
include=~/.config/fuzzel/lmtt-colors.ini

[main]
# Route launches through uwsm so apps land in their own systemd scope/slice
# with the graphical-session environment. (Electron/Chromium apps still
# self-reparent into app-<name>-<pid>.scope regardless — that's a Chromium
# behavior, not a fuzzel one.)
launch-prefix=uwsm app --
font=monospace:size=12
dpi-aware=auto
width=50
lines=15
horizontal-pad=20
vertical-pad=10
inner-pad=5

[border]
width=2
radius=8
